user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Extract date and time from $time_iso8601
    map $time_iso8601 $w3c_date {
        ~^([0-9]{4}-[0-9]{2}-[0-9]{2})T $1;
        default "0000-00-00";
    }

    map $time_iso8601 $w3c_time {
        ~^.+T([0-9]{2}:[0-9]{2}:[0-9]{2}) $1;
        default "00:00:00";
    }

    # Map X-Forwarded-For if present, else fallback to remote_addr
    map $http_x_forwarded_for $client_ip {
        "" $remote_addr;
        default $http_x_forwarded_for;
    }

    # W3C Extended Log Format: date time c-ip cs-method cs-uri-stem sc-status cs(User-Agent)
    # Using $request_uri to ensure query params are logged for parsing/detection
    log_format w3c "$w3c_date $w3c_time $client_ip $request_method $request_uri $status $http_user_agent";

    access_log /var/log/nginx/access.log w3c;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
